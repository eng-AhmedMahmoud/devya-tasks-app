name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    uses: eng-AhmedMahmoud/devya-workflows/.github/workflows/node-quality.yml@v1
    with:
      package-manager: npm
      build-command: npm run build
  security:
    uses: eng-AhmedMahmoud/devya-workflows/.github/workflows/node-security.yml@v1
    with:
      package-manager: npm
